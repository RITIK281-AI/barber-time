<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .barber-bg { fill: #000000; }
      .barber-white { fill: #FFFFFF; }
      .barber-black { fill: #000000; }
    </style>
  </defs>
  
  <!-- Outer Circle Background -->
  <circle cx="100" cy="100" r="95" class="barber-bg"/>
  
  <!-- Head Profile Group -->
  <g>
    <!-- Main head shape - white profile -->
    <path d="M 70 60 L 70 110 Q 70 130 85 140 L 115 140 Q 130 130 130 110 L 130 60 Q 130 45 115 40 L 85 40 Q 70 45 70 60 Z" class="barber-white"/>
    
    <!-- Spiky Hair/Quiff - Multiple spikes -->
    <path d="M 80 35 Q 75 20 85 10 Q 95 5 105 10 Q 115 20 110 35" class="barber-white"/>
    
    <!-- Hair spikes detail -->
    <path d="M 85 10 L 82 -5" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 100 5 L 100 -10" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 115 10 L 118 -5" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 110 25 L 125 15" stroke="#FFFFFF" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Ear -->
    <ellipse cx="60" cy="80" rx="8" ry="15" class="barber-white"/>
    <ellipse cx="63" cy="80" rx="4" ry="10" class="barber-black"/>
    
    <!-- Eye -->
    <circle cx="80" cy="70" r="4" class="barber-white"/>
    <circle cx="80" cy="70" r="2" class="barber-black"/>
    
    <!-- Nose -->
    <path d="M 95 75 L 95 95" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Mouth/Lips -->
    <path d="M 85 100 Q 95 105 105 100" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <!-- Beard - Full thick beard -->
    <path d="M 80 105 Q 100 125 120 105" class="barber-white"/>
    <path d="M 82 110 Q 100 130 118 110" class="barber-white"/>
    
    <!-- Beard texture lines -->
    <line x1="88" y1="107" x2="88" y2="120" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="95" y1="110" x2="95" y2="125" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="102" y1="110" x2="102" y2="125" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="109" y1="110" x2="109" y2="120" stroke="#000000" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Neck -->
    <rect x="88" y="140" width="14" height="12" class="barber-white"/>
  </g>
  
  <!-- Outer Circle Border -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#FFFFFF" stroke-width="2.5"/>
</svg>